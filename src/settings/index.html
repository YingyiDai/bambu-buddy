<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title data-i18n="settings.title">设置</title>
  <link rel="stylesheet" href="vendor/pico.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <nav class="tabbar">
      <button class="nav-item active" data-section="printers"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg></span><span data-i18n="nav.printers">打印机</span></button>
      <button class="nav-item" data-section="play"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.544-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.152A4 4 0 0 0 17.32 5z"/></svg></span><span data-i18n="nav.play">探索</span></button>
      <button class="nav-item" data-section="appearance"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg></span><span data-i18n="nav.appearance">外观</span></button>
      <button class="nav-item" data-section="about"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span><span data-i18n="nav.about">关于</span></button>
    </nav>
    <main class="content">

      <!-- ════ 打印机 ════ -->
      <section class="section section-printers" data-section="printers">
        <!-- 卡片轮播 -->
        <div class="carousel" id="printerCarousel">
          <button class="carousel-arrow prev" id="carPrev" aria-label="上一张"><svg viewBox="6 5 12 14" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div class="carousel-viewport" id="carViewport">
            <div class="carousel-track" id="carTrack"></div>
          </div>
          <button class="carousel-arrow next" id="carNext" aria-label="下一张"><svg viewBox="6 5 12 14" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <div class="carousel-dots" id="carDots"></div>
        <p id="err" class="err hidden"></p>
      </section>

      <!-- ════ 探索 ════ -->
      <section class="section hidden" data-section="play">
        <h1 class="section-title" data-i18n="play.title">探索</h1>
        <p class="section-sub" data-i18n="play.subtitle">不用连打印机，点一下就能看熊猫的各种状态</p>
        <div class="play-now" id="playNowCard">
          <div class="play-now-head">
            <div>
              <div class="play-now-cap" data-i18n="play.nowPlaying">当前正在演示</div>
              <div class="play-now-label" id="playStateLabel">—</div>
            </div>
            <button id="playReturnBtn" class="btn" data-i18n="play.returnToLive">回到真机</button>
          </div>
          <div class="progress-row hidden" id="progressRow">
            <div class="progress-head"><span data-i18n="play.dragProgress">拖动模拟打印进度</span><span class="val" id="playProgressVal">0%</span></div>
            <input type="range" id="playProgress" class="slider" min="0" max="100" value="0" />
          </div>
          <button id="autoTourBtn" class="btn" style="width:100%;margin-top:12px;" data-i18n="play.autoTour">自动巡演（依次播放全部状态）</button>
        </div>
        <div class="group-label" data-i18n="play.galleryHint">点一下试试</div>
        <div id="playGallery" class="gallery"></div>
      </section>

      <!-- ════ 外观 ════ -->
      <section class="section hidden" data-section="appearance">
        <h1 class="section-title" data-i18n="nav.appearance">外观</h1>
        <p class="section-sub" data-i18n="appearance.subtitle">调整熊猫在桌面上的外观与界面语言</p>
        <div class="section-rows">
          <div class="row row-stack">
            <div class="row-head">
              <span class="row-label" data-i18n="settings.petSize">宠物大小</span>
              <span class="row-val" id="sizeVal">220px</span>
            </div>
            <input type="range" id="sizeSlider" min="80" max="400" value="220" class="slider" />
          </div>
          <div class="row row-stack">
            <div class="row-head">
              <span class="row-label" data-i18n="settings.textSize">文字大小</span>
              <span class="row-val" id="fontSizeVal">12px</span>
            </div>
            <input type="range" id="fontSizeSlider" min="8" max="20" value="12" class="slider" />
          </div>
          <div class="row">
            <div class="row-text">
              <span class="row-label" data-i18n="settings.showLabel">显示文字</span>
              <span class="row-desc" data-i18n="settings.showLabelDesc">在熊猫下方显示状态文字</span>
            </div>
            <div class="row-control"><input type="checkbox" id="showLabelToggle" class="toggle" checked /></div>
          </div>
          <!-- 「显示文字」的子开关：缩进从属；关掉「显示文字」时由 settings.js 整体隐藏 -->
          <div class="row row-sub" id="rowShowLayer">
            <div class="row-text">
              <span class="row-label" data-i18n="settings.showLayer">显示层数</span>
              <span class="row-desc" data-i18n="settings.showLayerDesc">打印中在熊猫下方显示当前层 / 总层数</span>
            </div>
            <div class="row-control"><input type="checkbox" id="showLayerToggle" class="toggle" /></div>
          </div>
          <div class="row row-sub" id="rowShowTime">
            <div class="row-text">
              <span class="row-label" data-i18n="settings.showTime">显示剩余时间</span>
              <span class="row-desc" data-i18n="settings.showTimeDesc">打印中在熊猫下方显示预计剩余时间</span>
            </div>
            <div class="row-control"><input type="checkbox" id="showTimeToggle" class="toggle" /></div>
          </div>
          <div class="row">
            <div class="row-text">
              <span class="row-label" data-i18n="settings.language">语言</span>
              <span class="row-desc" data-i18n="settings.languageDesc">菜单与状态文字的界面语言</span>
            </div>
            <div class="row-control">
              <select id="localeSelect"><option value="zh-CN" data-i18n="settings.langZh">中文</option><option value="en" data-i18n="settings.langEn">English</option></select>
            </div>
          </div>
        </div>
      </section>

      <!-- ════ 关于 ════ -->
      <section class="section hidden" data-section="about">
        <div class="about-hero">
          <img class="about-img" src="../../assets/image/about.png" alt="Bambu Buddy" />
          <h2 id="aboutName">Bambu Buddy</h2>
          <p class="about-desc" data-i18n="settings.aboutDesc">一只住在桌面上的熊猫，会实时跟着你的拓竹打印机状态做出反应。</p>
        </div>

        <div class="section-rows">
          <div class="row">
            <div class="row-text">
              <span class="row-label" data-i18n="about.currentVersion">当前版本</span>
            </div>
            <div class="row-control">
              <span class="row-val" id="aboutCurrentVersion">v0.1.0</span>
              <button id="checkUpdateBtn" class="btn" data-i18n="settings.checkUpdate">检查更新</button>
            </div>
          </div>
          <div class="row">
            <div class="row-text">
              <span class="row-label" data-i18n="settings.autoCheckUpdate">自动检查更新</span>
            </div>
            <div class="row-control"><input type="checkbox" id="autoCheckUpdateToggle" class="toggle" checked /></div>
          </div>
          <div class="row">
            <div class="row-text"><span class="row-label" data-i18n="settings.aboutAuthor">作者</span></div>
            <div class="row-control"><a id="aboutAuthor" class="about-author-link" href="#">—</a></div>
          </div>
        </div>
        <p id="updateStatus" class="update-status hidden"></p>
      </section>

    </main>
  </div>
  <script src="settings.js"></script>
</body>
</html>
