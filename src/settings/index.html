<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Bambu 设置</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Tab 栏 -->
  <nav class="tab-bar" role="tablist">
    <button id="tabConnection" class="tab-btn active" data-tab="connection" type="button">连接</button>
    <button id="tabAppearance" class="tab-btn" data-tab="appearance" type="button">外观</button>
    <button id="tabAbout" class="tab-btn" data-tab="about" type="button">关于</button>
  </nav>

  <main id="content">
    <!-- ════ 连接 Tab ════ -->
    <section id="paneConnection" class="pane">
      <div class="mode-switch" role="tablist">
        <button id="modeCloud" class="mode-btn active" type="button">Bambu Cloud 账号</button>
        <button id="modeLan" class="mode-btn" type="button">Bambu LAN 本地</button>
      </div>

      <!-- Cloud 流程 -->
      <div id="cloudPane" class="subpane">
        <div id="cloudLogin" class="step">
          <label>区域<select id="cloudRegion"><option value="global">全球 / Overseas</option><option value="china">中国大陆</option></select></label>
          <label>账号（邮箱）<input id="cloudAccount" type="email" autocomplete="username" /></label>
          <label>密码<input id="cloudPassword" type="password" autocomplete="current-password" /></label>
          <button id="cloudLoginBtn" class="primary" type="button">登录</button>
        </div>
        <div id="cloudVerify" class="step hidden">
          <p class="hint">已向你的邮箱发送验证码，请输入：</p>
          <label>验证码<input id="cloudCode" type="text" inputmode="numeric" placeholder="6 位验证码" /></label>
          <button id="cloudVerifyBtn" class="primary" type="button">提交</button>
          <button id="cloudVerifyBack" class="link" type="button">← 返回登录</button>
        </div>
        <div id="cloudDevices" class="step hidden">
          <p class="hint">选择要连接的打印机：</p>
          <ul id="deviceList" class="device-list"></ul>
          <p id="noDevices" class="hint hidden">未发现绑定的打印机，请先在 Bambu Studio / 手机 App 中绑定设备。</p>
          <button id="cloudDevicesBack" class="link" type="button">← 返回登录</button>
        </div>
        <div id="cloudSummary" class="step hidden">
          <div class="summary">
            <div><span class="k">名称</span><span id="sumName" class="v">—</span></div>
            <div><span class="k">序列号</span><span id="sumSerial" class="v">—</span></div>
            <div><span class="k">区域</span><span id="sumRegion" class="v">—</span></div>
          </div>
          <button id="sumLogout" class="danger" type="button">退出登录</button>
          <button id="sumClose" class="link" type="button">关闭</button>
        </div>
      </div>

      <!-- LAN 流程 -->
      <div id="lanPane" class="subpane hidden">
        <div class="step">
          <label>打印机 IP 地址<input id="lanHost" type="text" placeholder="192.168.1.x" /></label>
          <label>访问码（Access Code）<input id="lanAccessCode" type="text" placeholder="机身屏幕可查" /></label>
          <label>序列号<input id="lanSerial" type="text" placeholder="01S00C..." /></label>
          <div class="row">
            <button id="lanTestBtn" type="button">测试连接</button>
            <button id="lanSaveBtn" class="primary" type="button">保存并连接</button>
          </div>
        </div>
      </div>

      <p id="err" class="err hidden"></p>
    </section>

    <!-- ════ 外观 Tab ════ -->
    <section id="paneAppearance" class="pane hidden">
      <div class="pref-group">
        <label class="pref-label">
          <span class="pref-title">宠物大小</span>
          <span class="pref-val" id="sizeVal">220px</span>
        </label>
        <input type="range" id="sizeSlider" min="80" max="400" value="220" class="slider" />
      </div>

      <div class="pref-group">
        <label class="pref-label">
          <span class="pref-title">文字大小</span>
          <span class="pref-val" id="fontSizeVal">12px</span>
        </label>
        <input type="range" id="fontSizeSlider" min="8" max="20" value="12" class="slider" />
      </div>

      <div class="pref-group">
        <label class="pref-label toggle-row">
          <span class="pref-title">显示文字</span>
          <input type="checkbox" id="showLabelToggle" class="toggle" checked />
        </label>
      </div>

      <div class="pref-group">
        <label class="pref-label">
          <span class="pref-title">语言</span>
        </label>
        <select id="localeSelect" class="select-full">
          <option value="zh-CN">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </section>

    <!-- ════ 关于 Tab ════ -->
    <section id="paneAbout" class="pane hidden">
      <div class="about-section">
        <div class="about-icon">🐼</div>
        <h2 id="aboutName">BambuPet</h2>
        <p class="about-version" id="aboutVersion">v0.1.0</p>
        <p class="about-desc">Bambu 打印机桌面宠物 — 一只熊猫常驻桌面，根据打印机状态播放对应动画。</p>
        <div class="about-meta">
          <div><span class="k">作者</span><span id="aboutAuthor" class="v">—</span></div>
        </div>
      </div>
    </section>
  </main>

  <script src="settings.js"></script>
</body>
</html>
