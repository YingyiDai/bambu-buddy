# 全平台打包 + 发版：打 tag 触发，在 macos / windows 原生 runner 上各打一份，
# 自动上传到对应 Release。详见仓库根目录 RELEASING.md。
#
# 触发方式：
#   1) 推送 tag：git tag vX.Y.Z && git push origin vX.Y.Z  →  从该 tag 构建并发布
#   2) 手动补建/重跑：Actions → Run workflow，填 tag（必填，如 v0.1.2），
#      可选 ref（构建用的 commit，默认即 tag；补建旧版时可填 main）
#
# 产物命名（见 package.json build.artifactName）：
#   macOS arm64 → Bambu.Buddy-<ver>-macOS-arm64.dmg / .zip（Developer ID 签名 + 公证）
#   Windows x64 → Bambu.Buddy-<ver>-Windows-x64.Setup.exe（未签名）
# 另有应用内自动更新所需的 latest-mac.yml / latest.yml / *.blockmap（见 RELEASING.md「产物」）。

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布到的 Release tag（如 v0.1.2，必填）'
        required: true
      ref:
        description: '构建用的 commit/ref（默认即 tag；补建旧版可填 main）'
        required: false
      draft:
        description: '建成草稿 Release（测试包用：不公开、不影响老用户自动更新，验完在页面点 Publish 即转正）'
        type: boolean
        default: false

# tag 名（Release 标识）；构建用的 ref（默认与 tag 相同）；是否草稿（仅手动触发可选，推 tag 恒为正式发布）
env:
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || inputs.tag) || github.ref_name }}
  DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: 准备公证用 API Key（把 secret 里的 .p8 写到临时文件）
        run: |
          echo "${{ secrets.APPLE_API_KEY_P8 }}" | base64 --decode > "$RUNNER_TEMP/authkey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/authkey.p8" >> "$GITHUB_ENV"
      - run: npm run build:mac
        env:
          # Developer ID 正式签名：.p12（证书+私钥）base64 存在 CSC_LINK，密码存在 CSC_KEY_PASSWORD
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # 公证：App Store Connect API Key（APPLE_API_KEY 指向上一步写出的 .p8 文件）
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          # zip + latest-mac.yml + blockmap 是应用内自动更新（electron-updater）的依赖：
          # 老版本应用读 latest-mac.yml 找到 zip 下载安装。缺了它们应用内更新即失效。
          # dmg.blockmap 排除：mac 更新只走 zip，dmg 的增量索引用不上（构建侧已
          # writeUpdateInfo:false 不再生成，这里兜底），少一个资产让 Release 页更清爽。
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
            !dist/*.dmg.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: win-dist
          # latest.yml + blockmap 是应用内自动更新（electron-updater）的依赖，同 mac 说明。
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.TAG_NAME }}
          REPO: ${{ github.repository }}
          DRAFT: ${{ env.DRAFT }}
          TARGET: ${{ env.BUILD_REF }}
        run: |
          set -e
          # Release 不存在则创建（带自动生成说明；已存在则跳过，保留手写说明）。
          # 草稿模式（DRAFT=true，仅手动触发）：加 --draft 建成草稿——不公开、不进 releases API，
          # 故不会被老版本应用的自动更新当成「最新版」拉走。用 --target 让草稿关联到本次构建的
          # 那个 commit，将来在页面点 Publish 转正时 tag 就落在实测过的代码上。
          CREATE_ARGS=(--repo "$REPO" --title "Bambu Buddy $TAG" --generate-notes)
          if [ "$DRAFT" = "true" ]; then
            CREATE_ARGS+=(--draft --target "$TARGET")
          fi
          gh release create "$TAG" "${CREATE_ARGS[@]}" || true
          # 上传/覆盖 mac + win 安装包，以及应用内自动更新所需的 zip / latest*.yml / blockmap
          # （dmg.blockmap 除外：mac 更新只走 zip，用不上）
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' \
            -o -name '*.yml' -o -name '*.blockmap' \) ! -name '*.dmg.blockmap' -print0 \
            | xargs -0 gh release upload "$TAG" --repo "$REPO" --clobber
          echo "=== $TAG 资产 ==="
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'
      - name: 在说明顶部注入「下载」引导（幂等）
        # 资产列表混着 yml/zip/blockmap（自动更新依赖），普通用户分不清该下哪个。
        # 在说明最前面固定给 dmg/exe 两个安装包的直链。幂等：说明里已有该节就跳过，
        # 故补建/重跑不会重复注入，也不覆盖手写说明里已存在的引导。
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.TAG_NAME }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          VER="${TAG#v}"                                   # 文件名用不带 v 的版本号
          BASE="https://github.com/$REPO/releases/download/$TAG"
          BODY=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body // ""')
          if printf '%s' "$BODY" | grep -qF '## 📥 下载'; then
            echo "下载引导已存在，跳过"; exit 0
          fi
          {
            printf '## 📥 下载\n\n'
            printf -- '- **macOS（Apple Silicon）**：[Bambu.Buddy-%s-macOS-arm64.dmg](%s/Bambu.Buddy-%s-macOS-arm64.dmg)\n' "$VER" "$BASE" "$VER"
            printf -- '- **Windows（x64）**：[Bambu.Buddy-%s-Windows-x64.Setup.exe](%s/Bambu.Buddy-%s-Windows-x64.Setup.exe)\n\n' "$VER" "$BASE" "$VER"
            printf '> 资产列表中的其余文件（`latest*.yml` / `*.zip` / `*.blockmap`）为应用内自动更新所需，普通用户无需理会。\n\n'
            printf -- '---\n\n'
            printf '%s' "$BODY"
          } | gh release edit "$TAG" --repo "$REPO" --notes-file -
          echo "已注入下载引导"
